<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.07" stroke="white" stroke-width="1">
    <line x1="0" y1="56" x2="440" y2="56"/>
    <line x1="0" y1="112" x2="440" y2="112"/>
    <line x1="0" y1="168" x2="440" y2="168"/>
    <line x1="0" y1="224" x2="440" y2="224"/>
    <line x1="88" y1="0" x2="88" y2="280"/>
    <line x1="176" y1="0" x2="176" y2="280"/>
    <line x1="264" y1="0" x2="264" y2="280"/>
    <line x1="352" y1="0" x2="352" y2="280"/>
  </g>

  <!-- Logo icon -->
  <image href="icon128.png" x="176" y="52" width="88" height="88" clip-path="url(#logoClip)"/>
  <defs>
    <clipPath id="logoClip">
      <rect x="176" y="52" width="88" height="88" rx="20"/>
    </clipPath>
  </defs>

  <!-- Wordmark -->
  <text x="220" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" text-anchor="middle" letter-spacing="-0.5">
    <tspan fill="#c4b5fd">Core</tspan><tspan fill="white">Mem</tspan>
  </text>

  <!-- Tagline -->
  <text x="220" y="204" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="white" opacity="0.7" text-anchor="middle" letter-spacing="0.1">
    Your context, always in reach.
  </text>
</svg>
